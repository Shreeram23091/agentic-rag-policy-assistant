<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STMicroelectronics | AI Knowledge Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #00338d; /* ST Blue */
            --primary-light: #0055d4;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --user-msg: #334155;
            --bot-msg: #00338d;
            --accent: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 1.5rem 2rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-dot {
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 1.25rem;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg);
            border-bottom-right-radius: 0.25rem;
            color: white;
        }

        .bot-message {
            align-self: flex-start;
            background-color: var(--card-bg);
            border-bottom-left-radius: 0.25rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .bot-message .sources {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .source-badge {
            display: inline-block;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 5px;
            font-family: monospace;
        }

        .input-area {
            padding: 2rem;
            background: linear-gradient(to top, var(--bg) 80%, transparent);
            position: relative;
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            background: var(--card-bg);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transition: border-color 0.3s;
        }

        .input-container:focus-within {
            border-color: var(--accent);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing {
            font-style: italic;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }

        /* Markdown Styling */
        .bot-message h1, .bot-message h2, .bot-message h3 { margin: 1rem 0 0.5rem 0; font-family: 'Outfit'; }
        .bot-message p { margin-bottom: 0.75rem; }
        .bot-message code { background: rgba(0,0,0,0.3); padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.9em; }
        .bot-message pre { background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 1rem 0; }
        .bot-message ul, .bot-message ol { margin-left: 1.5rem; margin-bottom: 1rem; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="logo-section">
            <div class="logo-dot"></div>
            <h1>STMicroelectronics <span style="font-weight: 300; opacity: 0.7;">| AI Assistant</span></h1>
        </div>
        <div style="font-size: 0.8rem; color: var(--text-muted);">v1.0.0 (Gemini RAG)</div>
    </header>

    <div id="chat-container">
        <div class="message bot-message">
            Hello! I am your <strong>STMicroelectronics Assistant</strong>. I can answer questions about STM32 products, manufacturing processes, quality standards, and company policies. How can I help you today?
        </div>
    </div>

    <div class="input-area">
        <div id="typing-indicator" class="typing" style="max-width: 800px; margin: 0 auto 10px auto;">Assistant is thinking...</div>
        <form class="input-container" id="chat-form">
            <input type="text" id="user-input" placeholder="Ask about STM32, Manufacturing, Onboarding..." autocomplete="off">
            <button type="submit" id="send-btn">
                Send
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </form>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        // Generate a simple session ID
        const sessionId = 'session-' + Math.random().toString(36).substr(2, 9);

        function appendMessage(role, text, sources = []) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}-message`;
            
            if (role === 'bot') {
                msgDiv.innerHTML = marked.parse(text);
                if (sources && sources.length > 0) {
                    const sourcesDiv = document.createElement('div');
                    sourcesDiv.className = 'sources';
                    sourcesDiv.innerHTML = '<strong>Sources:</strong> ' + 
                        sources.map(s => `<span class="source-badge">${s}</span>`).join('');
                    msgDiv.appendChild(sourcesDiv);
                }
            } else {
                msgDiv.textContent = text;
            }
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = userInput.value.trim();
            if (!query) return;

            // Add user message
            appendMessage('user', query);
            userInput.value = '';
            
            // Show loading
            sendBtn.disabled = true;
            typingIndicator.style.display = 'block';

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, session_id: sessionId })
                });

                const data = await response.json();
                
                if (response.ok) {
                    appendMessage('bot', data.answer, data.sources);
                } else {
                    appendMessage('bot', `**Error:** ${data.detail || 'Something went wrong.'}`);
                }
            } catch (err) {
                appendMessage('bot', '**Error:** Could not connect to the server.');
            } finally {
                sendBtn.disabled = false;
                typingIndicator.style.display = 'none';
            }
        });
    </script>
</body>
</html>
