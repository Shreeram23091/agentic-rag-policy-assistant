version: "3.9"

services:
  rag-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acme-rag-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist the FAISS index between container restarts
      - faiss_data:/app/data/faiss_index
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  faiss_data:
    driver: local
